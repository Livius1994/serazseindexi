<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-subids
  async
  defer
></script>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Verificação</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .container {
      background: #fff;
      padding: 40px 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
      text-align: center;
      max-width: 400px;
      width: 90%;
      animation: fadeIn 1s ease-in-out;
      position: relative;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .shield {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #4da3ff, #0066ff);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(0, 102, 255, 0.35);
    }

    .shield svg {
      width: 48px;
      height: 48px;
      fill: white;
    }

    h2 {
      margin-bottom: 25px;
      font-weight: 600;
      color: #222;
      font-size: 28px;
    }

    .btn {
      display: inline-block;
      padding: 15px 28px;
      background: linear-gradient(135deg, #ff4fa3, #ff007f);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(255, 0, 127, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 0, 127, 0.35);
      background: linear-gradient(135deg, #ff66b3, #ff1493);
    }

    .links {
      margin-top: 25px;
      font-size: 14px;
    }

    .links a {
      margin: 0 10px;
      color: #007bff;
      text-decoration: none;
      transition: 0.2s;
    }

    .links a:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    footer {
      margin-top: 60px;
      font-size: 14px;
      color: #777;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="shield">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L4 5V11C4 16.55 7.84 21.74 12 23C16.16 21.74 20 16.55 20 11V5L12 2ZM10 17L6 13L7.41 11.59L10 14.17L16.59 7.58L18 9L10 17Z"/>
      </svg>
    </div>

    <h2>Verificação de Segurança</h2>

    <a href="./f2/" class="btn">
      Eu não sou um robô e quero seguir
    </a>

    <div class="links">
      <a href="#">Política de Privacidade</a> |
      <a href="#">Termos de Uso</a>
    </div>

  </div>

  <footer>
    &copy; 2026 Todos os direitos reservados.
  </footer>

</body>
</html>
